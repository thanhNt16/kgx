name: ci
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --lib
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --test '*' -- --skip smoke
  smoke:
    runs-on: ubuntu-latest
    env:
      KGX_LLM: mock
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p kgx-cli --bin kg
      - run: echo "CARGO_BIN_EXE_kg=$PWD/target/debug/kg" >> "$GITHUB_ENV"
      - run: cargo test --workspace --test 'smoke*' -- --test-threads=1
  cross-tool:
    runs-on: ubuntu-latest
    env:
      KGX_LLM: mock
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p kgx-cli --bin kg
      - run: echo "CARGO_BIN_EXE_kg=$PWD/target/debug/kg" >> "$GITHUB_ENV"
      - run: cargo test --workspace -p smoke -- --test-threads=1
      - run: cargo test --workspace -p kgx-mcp --test protocol
  bench-ish:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      KGX_LLM: mock
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p kgx-retrieval --test hybrid -- --nocapture
