<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KGX Second Brain — 3D Graph</title>
<script type="importmap">

<style>
* { box-sizing: border-box; }
:root { --bg: #06090f; --surface: #0e2028; --surface2: #0f1e24; --border: #1a3a4030; --text: #e0eded; --muted: #6a9e9e; --accent: #1DA27E; --danger: #e05252; --panel-w: 240px; --detail-w: 300px; }
body { margin: 0; font-family: system-ui, sans-serif; color: var(--text); background: var(--bg); overflow: hidden; }
header { padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 10px; height: 40px; flex-shrink: 0; }
header strong { font-size: 13px; color: var(--accent); letter-spacing: -0.3px; }
#counts { color: var(--muted); font-size: 11px; }
main { display: flex; height: calc(100vh - 40px); }
#left-panel { width: var(--panel-w); min-width: 160px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.panel-header { padding: 10px 12px 6px; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.filter-section { padding: 4px 8px; overflow-y: auto; flex: 1; }
.filter-label { display: flex; align-items: center; gap: 6px; padding: 3px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; color: var(--text); transition: background 0.1s; }
.filter-label:hover { background: rgba(255,255,255,0.04); }
.filter-label input { accent-color: var(--accent); }
.filter-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.filter-count { margin-left: auto; color: var(--muted); font-size: 10px; }
.filter-actions { display: flex; gap: 6px; padding: 6px 10px 8px; }
.filter-actions button { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 10px; padding: 2px 10px; border-radius: 4px; cursor: pointer; }
.filter-actions button:hover { color: var(--text); border-color: var(--accent); }
#canvas-container { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
#canvas-container canvas { display: block; }
#hud { position: absolute; top: 10px; left: 12px; pointer-events: none; font-size: 11px; color: var(--muted); line-height: 1.5; z-index: 10; }
#hud strong { color: var(--text); }
#hud .warn { color: var(--danger); }
#canvas-actions { position: absolute; top: 0; right: 12px; display: flex; gap: 4px; z-index: 10; }
#canvas-actions button { background: rgba(14,32,40,0.85); border: 1px solid var(--border); color: var(--muted); font-size: 10px; padding: 4px 10px; border-radius: 4px; cursor: pointer; pointer-events: auto; }
#canvas-actions button:hover { color: var(--text); border-color: var(--accent); }
#canvas-actions button.active { color: var(--accent); border-color: var(--accent); }
#tooltip { position: absolute; pointer-events: none; opacity: 0; transition: opacity 0.12s; z-index: 20; }
#tooltip.visible { opacity: 1; }
#tooltip-inner { background: rgba(10,22,26,0.92); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 12px; font-size: 11px; max-width: 300px; }
#tooltip-name { color: #fff; font-weight: 500; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
#tooltip-meta { color: rgba(255,255,255,0.4); font-size: 10px; }
#tooltip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
#right-panel { width: var(--detail-w); min-width: 200px; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; display: none; flex-direction: column; }
#right-panel.open { display: flex; }
.detail-header { padding: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 8px; }
.detail-close { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1; }
.detail-close:hover { color: var(--text); }
.detail-title { font-size: 13px; font-weight: 600; color: var(--text); word-break: break-all; }
.detail-type { font-size: 10px; color: var(--muted); margin-top: 2px; }
.detail-body { padding: 10px 12px; font-size: 11px; }
.detail-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.detail-row:last-child { border-bottom: none; }
.detail-row-label { color: var(--muted); }
.detail-row-value { color: var(--text); text-align: right; max-width: 60%; word-break: break-all; }
.detail-connections { margin-top: 10px; }
.detail-conn-group { margin-bottom: 10px; }
.detail-conn-header { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 4px; }
.detail-conn-item { display: flex; align-items: center; gap: 5px; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: background 0.1s; }
.detail-conn-item:hover { background: rgba(255,255,255,0.06); }
.detail-conn-name { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.detail-conn-type { color: var(--muted); font-size: 9px; flex-shrink: 0; }
.detail-conn-sprint { color: var(--accent); font-size: 9px; flex-shrink: 0; }
.show-labels-row { padding: 6px 10px 8px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text); border-top: 1px solid var(--border); margin-top: auto; }
.show-labels-row input { accent-color: var(--accent); }
#phase-legend { padding: 6px 10px; border-top: 1px solid var(--border); }
.phase-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); padding: 2px 0; }
.phase-swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.resize-handle { width: 3px; cursor: col-resize; background: transparent; position: relative; flex-shrink: 0; z-index: 5; }
.resize-handle::after { content: ''; position: absolute; left: 1px; top: 0; bottom: 0; width: 1px; background: var(--border); }
.resize-handle:hover::after, .resize-handle.active::after { background: var(--accent); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
#search-box { padding: 6px 10px; border-bottom: 1px solid var(--border); }
#search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 11px; padding: 4px 8px; border-radius: 4px; outline: none; }
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--muted); }
</style>
</head>
<body>
<header>
  <strong>KGX Second Brain</strong>
  <span id="counts"></span>
</header>
<main>
  <aside id="left-panel">
    <div id="search-box">
      <input type="text" id="search-input" placeholder="Search nodes...">
    </div>
    <div class="panel-header">Node Types</div>
    <div id="node-filters" class="filter-section"></div>
    <div class="panel-header" style="padding-top:12px">Edge Types</div>
    <div id="edge-filters" class="filter-section"></div>
    <div class="filter-actions">
      <button id="filter-all">All</button>
      <button id="filter-none">None</button>
    </div>
    <div id="phase-legend"></div>
    <div class="show-labels-row">
      <input type="checkbox" id="show-labels" checked>
      <label for="show-labels">Show labels</label>
    </div>
  </aside>
  <div class="resize-handle" id="left-handle"></div>
  <div id="canvas-container">
    <div id="hud"></div>
    <div id="canvas-actions">
      <button id="btn-fit" title="Fit graph to view">&#x26F6; Fit</button>
      <button id="btn-reset" title="Reset camera">&#x21BA; Reset</button>
    </div>
    <div id="tooltip"><div id="tooltip-inner"></div></div>
  </div>
  <div class="resize-handle" id="right-handle"></div>
  <aside id="right-panel">
    <div class="detail-header">
      <div><div class="detail-title"></div><div class="detail-type"></div></div>
      <button class="detail-close" id="detail-close">&times;</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </aside>
</main>

st": "01KWNYYX7TZRDN9K2N6R8T3W1XR", "type": "REFERENCES"}], "phases": [[1, "Foundation", "#3fb950"], [7, "Features", "#58a6ff"], [13, "Integration", "#d29922"], [19, "Hardening", "#f85149"], [25, "Advanced", "#bc8cff"], [31, "Maturity", "#ff7b72"]]};

}

  const s = n.sprint || 1;
  if (!sprintOffset[s]) sprintOffset[s] = 0;
  n.x = (s - 1) * 8 - 140;
  n.y = (sprintOffset[s] - (sprintCounts[s] - 1) / 2) * 12;
  n.z = (Math.random() - 0.5) * 40;
  sprintOffset[s]++;
}

// Run force simulation
function simulate3D() {
  const iterations = 120;
  const repulsion = 600;
  const attraction = 0.003;
  const damping = 0.85;
  const centerGravity = 0.008;

  for (let iter = 0; iter < iterations; iter++) {
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const dx = nodes3D[j].x - nodes3D[i].x;
        const dy = nodes3D[j].y - nodes3D[i].y;
        const dz = nodes3D[j].z - nodes3D[i].z;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
        const force = repulsion / (dist * dist);
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        const fz = (dz / dist) * force;
        nodes3D[i].vx -= fx; nodes3D[i].vy -= fy; nodes3D[i].vz -= fz;
        nodes3D[j].vx += fx; nodes3D[j].vy += fy; nodes3D[j].vz += fz;
      }
    }
    for (const e of edges3D) {
      const dx = e.target.x - e.source.x;
      const dy = e.target.y - e.source.y;
      const dz = e.target.z - e.source.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
      const force = (dist - 30) * attraction;
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      const fz = (dz / dist) * force;
      e.source.vx += fx; e.source.vy += fy; e.source.vz += fz;
      e.target.vx -= fx; e.target.vy -= fy; e.target.vz -= fz;
    }
    for (const n of nodes3D) {
      n.vx -= n.x * centerGravity;
      n.vy -= n.y * centerGravity;
      n.vz -= n.z * centerGravity;
      n.vx *= damping; n.vy *= damping; n.vz *= damping;
      n.x += n.vx; n.y += n.vy; n.z += n.vz;
    }
  }
}
simulate3D();

// --- Node meshes ---

// --- Edge lines ---
const edgeTypeColors = {
  REFERENCES: '#1DA27E', CONTAINS: '#22c55e', DEFINES: '#a855f7',
  CALLS: '#3b82f6', IMPORTS: '#60a5fa', IMPLEMENTS: '#f97316'
};

function buildEdgeGeometry() {
  const positions = [];
  const colors = [];
  const hasHL = highlightedIds && highlightedIds.size > 0;

  for (const e of edges3D) {
    if (!enabledTypes.has(e.source.kind) || !enabledTypes.has(e.target.kind)) continue;
    if (!enabledEdgeRels.has(e.type)) continue;
    if (hasHL && !highlightedIds.has(e.source.idx) && !highlightedIds.has(e.target.idx)) continue;

    positions.push(e.source.x, e.source.y, e.source.z, e.target.x, e.target.y, e.target.z);
    const edgeColor = new THREE.Color(edgeTypeColors[e.type] || '#1a3a4080');
    const intensity = hasHL ? (highlightedIds.has(e.source.idx) && highlightedIds.has(e.target.idx) ? 0.4 : 0.03) : 0.15;
    colors.push(edgeColor.r * intensity, edgeColor.g * intensity, edgeColor.b * intensity);
    colors.push(edgeColor.r * intensity, edgeColor.g * intensity, edgeColor.b * intensity);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  return geo;
}

let edgeLines = new THREE.LineSegments(
  buildEdgeGeometry(),
  new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 1.0, blending: THREE.AdditiveBlending, depthWrite: false, toneMapped: false })
);
scene.add(edgeLines);

function rebuildEdges() {
  edgeLines.geometry.dispose();
  edgeLines.geometry = buildEdgeGeometry();
}

// --- Interaction ---
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hoveredIdx = -1;
let selectedId = null;
let highlightedIds = null;
const enabledTypes = new Set();
const enabledEdgeRels = new Set();

const tooltip = document.getElementById('tooltip');
const tooltipInner = document.getElementById('tooltip-inner');

renderer.domElement.addEventListener('pointermove', (e) => {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length > 0) {
    const idx = hits[0].object.userData.idx;
    if (idx !== hoveredIdx) {
      hoveredIdx = idx;
      const n = nodes3D[idx];
      tooltipInner.innerHTML = `<div id="tooltip-name"><span id="tooltip-dot" style="background:${n.color}"></span>${shortName(n.id)}<div id="tooltip-meta">${n.kind} · Sprint ${n.sprint} · ${n.phase}<br>PageRank: ${n.pagerank}</div></div>`;
      tooltip.style.left = (e.clientX - container.getBoundingClientRect().left + 16) + 'px';
      tooltip.style.top = (e.clientY - container.getBoundingClientRect().top - 10) + 'px';
      tooltip.classList.add('visible');
      renderer.domElement.style.cursor = 'pointer';
    }
  } else {
    hoveredIdx = -1;
    tooltip.classList.remove('visible');
    renderer.domElement.style.cursor = 'default';
  }
});

renderer.domElement.addEventListener('pointerleave', () => {
  hoveredIdx = -1;
  tooltip.classList.remove('visible');
  renderer.domElement.style.cursor = 'default';
});

renderer.domElement.addEventListener('click', (e) => {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length > 0) {
    selectNode(hits[0].object.userData.idx);
  } else {
    selectNode(null);
  }
});

// --- Selection ---
const rightPanel = document.getElementById('right-panel');
const detailClose = document.getElementById('detail-close');
const detailTitle = rightPanel.querySelector('.detail-title');
const detailType = rightPanel.querySelector('.detail-type');
const detailBody = document.getElementById('detail-body');

function selectNode(idx) {
  selectedId = idx;
  highlightedIds = null;
  if (idx === null) {
    rightPanel.classList.remove('open');
    updateDetail(null);
    rebuildEdges();
    updateNodeAppearance();
    updateHUD();
    return;
  }
  const n = nodes3D[idx];
  detailTitle.textContent = shortName(n.id);
  detailType.textContent = n.kind + ' · Sprint ' + n.sprint + ' · ' + n.phase;
  updateDetail(n);
  rightPanel.classList.add('open');
  const set = new Set(); set.add(idx);
  for (const e of DATA.edges) {
    if (e.src === n.id) {
      const ti = nodes3D.findIndex(nn => nn.id === e.dst);
      if (ti >= 0) set.add(ti);
    }
    if (e.dst === n.id) {
      const si = nodes3D.findIndex(nn => nn.id === e.src);
      if (si >= 0) set.add(si);
    }
  }
  highlightedIds = set;
  rebuildEdges();
  updateNodeAppearance();
  updateHUD();
}

detailClose.addEventListener('click', () => selectNode(null));
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') selectNode(null); });

function updateDetail(n) {
  if (!n) { detailBody.innerHTML = ''; return; }
  let out = '';
  out += `<div class="detail-row"><span class="detail-row-label">ID</span><span class="detail-row-value">${n.id}</span></div>`;
  out += `<div class="detail-row"><span class="detail-row-label">Kind</span><span class="detail-row-value">${n.kind}</span></div>`;
  out += `<div class="detail-row"><span class="detail-row-label">Sprint</span><span class="detail-row-value">${n.sprint}</span></div>`;
  out += `<div class="detail-row"><span class="detail-row-label">Phase</span><span class="detail-row-value">${n.phase}</span></div>`;
  out += `<div class="detail-row"><span class="detail-row-label">PageRank</span><span class="detail-row-value">${n.pagerank}</span></div>`;
  const outbound = DATA.edges.filter(e => e.src === n.id);
  const inbound = DATA.edges.filter(e => e.dst === n.id);
  out += `<div class="detail-row"><span class="detail-row-label">Outbound</span><span class="detail-row-value">${outbound.length}</span></div>`;
  out += `<div class="detail-row"><span class="detail-row-label">Inbound</span><span class="detail-row-value">${inbound.length}</span></div>`;
  if (outbound.length > 0) {
    out += `<div class="detail-connections"><div class="detail-conn-group"><div class="detail-conn-header">References</div>`;
    for (const e of outbound.slice(0, 30)) {
      const ti = nodes3D.findIndex(nn => nn.id === e.dst);
      if (ti < 0) continue;
      const tn = nodes3D[ti];
      out += `<div class="detail-conn-item" data-idx="${ti}"><span class="filter-dot" style="background:${tn.color}"></span><span class="detail-conn-name">${shortName(tn.id)}</span><span class="detail-conn-sprint">S${tn.sprint}</span><span class="detail-conn-type">${e.type}</span></div>`;
    }
    if (outbound.length > 30) out += `<div style="font-size:10px;color:var(--muted);padding:4px 6px">+${outbound.length-30} more</div>`;
    out += `</div></div>`;
  }
  if (inbound.length > 0) {
    out += `<div class="detail-connections"><div class="detail-conn-group"><div class="detail-conn-header">Referenced by</div>`;
    for (const e of inbound.slice(0, 30)) {
      const si = nodes3D.findIndex(nn => nn.id === e.src);
      if (si < 0) continue;
      const sn = nodes3D[si];
      out += `<div class="detail-conn-item" data-idx="${si}"><span class="filter-dot" style="background:${sn.color}"></span><span class="detail-conn-name">${shortName(sn.id)}</span><span class="detail-conn-sprint">S${sn.sprint}</span><span class="detail-conn-type">${e.type}</span></div>`;
    }
    if (inbound.length > 30) out += `<div style="font-size:10px;color:var(--muted);padding:6px">+${inbound.length-30} more</div>`;
    out += `</div></div>`;
  }
  detailBody.innerHTML = out;
  detailBody.querySelectorAll('.detail-conn-item').forEach(el => {
    el.addEventListener('click', () => selectNode(parseInt(el.dataset.idx)));
  });
}

// --- Node appearance ---
function updateNodeAppearance() {
  const hasHL = highlightedIds && highlightedIds.size > 0;
  for (let i = 0; i < N; i++) {
    const n = nodes3D[i];
    const m = meshes[i];
    const visible = enabledTypes.has(n.kind);
    m.visible = visible;
    n.label.visible = visible && showLabels;
    if (!visible) continue;
    if (hasHL) {
      const bright = highlightedIds.has(i) ? 1.0 : 0.12;
      m.material.color.copy(new THREE.Color(n.color)).multiplyScalar(bright);
      m.scale.setScalar(n.radius * (highlightedIds.has(i) ? 1.2 : 0.4));
    } else {
      m.material.color.set(n.color);
      m.scale.setScalar(n.radius);
    }
  }
}

// --- Filters ---
const hud = document.getElementById('hud');

function buildFilters() {
  const counts = {};
  for (const n of nodes3D) counts[n.kind] = (counts[n.kind] || 0) + 1;
  const allNodeTypes = Object.keys(counts).sort();
  for (const t of allNodeTypes) enabledTypes.add(t);
  const ec = {};
  for (const e of DATA.edges) ec[e.type] = (ec[e.type] || 0) + 1;
  const allEdgeRels = Object.keys(ec).sort();
  for (const r of allEdgeRels) enabledEdgeRels.add(r);

  const nf = document.getElementById('node-filters');
  nf.innerHTML = allNodeTypes.map(t => `<label class="filter-label"><input type="checkbox" checked data-type="${t}"><span class="filter-dot" style="background:${nodeColor(t)}"></span>${t}<span class="filter-count">${counts[t]}</span></label>`).join('');
  nf.querySelectorAll('input').forEach(cb => cb.addEventListener('change', () => {
    if (cb.checked) enabledTypes.add(cb.dataset.type); else enabledTypes.delete(cb.dataset.type);
    updateNodeAppearance(); rebuildEdges(); updateHUD();
  }));

  const ef = document.getElementById('edge-filters');
  ef.innerHTML = allEdgeRels.map(r => `<label class="filter-label"><input type="checkbox" checked data-rel="${r}"><span class="filter-dot" style="background:#6a9e9e"></span>${r}<span class="filter-count">${DATA.edges.filter(e=>e.type===r).length}</span></label>`).join('');
  ef.querySelectorAll('input').forEach(cb => cb.addEventListener('change', () => {
    if (cb.checked) enabledEdgeRels.add(cb.dataset.rel); else enabledEdgeRels.delete(cb.dataset.rel);
    rebuildEdges(); updateHUD();
  }));

  document.getElementById('filter-all').addEventListener('click', () => {
    nf.querySelectorAll('input').forEach(cb => { cb.checked = true; cb.dispatchEvent(new Event('change')); });
    ef.querySelectorAll('input').forEach(cb => { cb.checked = true; cb.dispatchEvent(new Event('change')); });
  });
  document.getElementById('filter-none').addEventListener('click', () => {
    nf.querySelectorAll('input').forEach(cb => { cb.checked = false; cb.dispatchEvent(new Event('change')); });
    ef.querySelectorAll('input').forEach(cb => { cb.checked = false; cb.dispatchEvent(new Event('change')); });
  });

  const el = document.getElementById('phase-legend');
  el.innerHTML = '<div class="panel-header">Phases</div>' + phases.map(([,name,color]) =>
    `<div class="phase-item"><span class="phase-swatch" style="background:${color}"></span>${name}</div>`
  ).join('');

  updateHUD();
}

function updateHUD() {
  const visibleNodes = nodes3D.filter(n => enabledTypes.has(n.kind)).length;
  const visibleEdges = edges3D.filter(e => enabledTypes.has(e.source.kind) && enabledTypes.has(e.target.kind) && enabledEdgeRels.has(e.type)).length;
  let h = `<strong>${visibleNodes}</strong> nodes, <strong>${visibleEdges}</strong> edges`;
  if (visibleNodes < N) h += `<br><span class="warn">${visibleNodes} of ${N} nodes shown</span>`;
  if (selectedId !== null) h += `<br>1 selected`;
  hud.innerHTML = h;
}

// --- Search ---
const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) {
    highlightedIds = null;
    updateNodeAppearance();
    rebuildEdges();
    return;
  }
  const set = new Set();
  for (let i = 0; i < N; i++) {
    const n = nodes3D[i];
    if (n.id.toLowerCase().includes(q) || n.kind.includes(q) || n.phase.toLowerCase().includes(q)) {
      set.add(i);
    }
  }
  highlightedIds = set;
  updateNodeAppearance();
  rebuildEdges();
  updateHUD();
});

// --- Show labels toggle ---
document.getElementById('show-labels').addEventListener('change', (e) => {
  showLabels = e.target.checked;
  for (const n of nodes3D) {
    if (n.label) n.label.visible = showLabels && enabledTypes.has(n.kind);
  }
});

// --- Fit view ---
function fitView() {
  const box = new THREE.Box3().setFromObject(nodeGroup);
  if (box.isEmpty()) return;
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim * 1.2;
  camera.position.set(center.x + dist * 0.5, center.y + dist * 0.3, center.z + dist);
  controls.target.copy(center);
  controls.update();
}
document.getElementById('btn-fit').addEventListener('click', fitView);

function resetCamera() {
  camera.position.set(0, 0, 300);
  controls.target.set(0, 0, 0);
  controls.update();
}
document.getElementById('btn-reset').addEventListener('click', resetCamera);

// --- Resize ---
function resize() {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  labelRenderer.setSize(w, h);
}
window.addEventListener('resize', resize);

// --- Resize handles ---
let resizing = null;
const leftHandle = document.getElementById('left-handle');
const rightHandle = document.getElementById('right-handle');
leftHandle.addEventListener('pointerdown', (e) => { e.preventDefault(); resizing = leftHandle; leftHandle.setPointerCapture(e.pointerId); });
rightHandle.addEventListener('pointerdown', (e) => { e.preventDefault(); resizing = rightHandle; rightHandle.setPointerCapture(e.pointerId); });
document.addEventListener('pointermove', (e) => {
  if (!resizing) return;
  if (resizing === leftHandle) { document.getElementById('left-panel').style.width = Math.max(160, Math.min(500, e.clientX)) + 'px'; }
  else { document.getElementById('right-panel').style.width = Math.max(200, Math.min(500, container.getBoundingClientRect().right - e.clientX + 1)) + 'px'; }
  resize();
});
document.addEventListener('pointerup', () => { if (resizing) resizing = null; });
document.addEventListener('pointercancel', () => { if (resizing) resizing = null; });

// --- Animate ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  composer.render();
  labelRenderer.render(scene, camera);
}

// --- Init ---
buildFilters();
updateNodeAppearance();
rebuildEdges();
setTimeout(() => fitView(), 200);
animate();
</script>
</body>
</html>
